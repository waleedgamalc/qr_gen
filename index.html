<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card">
        <h1>QR Code Generator</h1>
        <p class="subtitle">Turn any link or text into a scannable QR code.</p>

        <form class="qr-form">
            <input type="text" placeholder="Enter a URL or text" required>
            <button type="submit">Generate</button>
        </form>

        <div class="qr-preview">
            <div class="qr-placeholder">
                <span>Your QR code will appear here</span>
            </div>
        </div>
    </main>

    <footer>
        <p>Built as part of a DevOps learning project · Linux · Docker · GitHub Actions</p>
    </footer>
</body>
</html>
