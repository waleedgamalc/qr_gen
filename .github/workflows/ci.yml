name: CI/CD Pipeline

# Trigger this workflow on pushes to main and on pull requests targeting main
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  # ---------- JOB 1: Run tests ----------
  test:
    runs-on: ubuntu-latest   # the type of machine GitHub provisions to run this job

    steps:
      - name: Check out the repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v

  # ---------- JOB 2: Build and push Docker image ----------
  build-and-push:
    runs-on: ubuntu-latest
    needs: test              # this job only runs if the "test" job succeeds
    if: github.event_name == 'push'   # only push images on actual pushes to main, not PRs

    steps:
      - name: Check out the repository code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push the image
        uses: docker/build-push-action@v6
        with:
          context: .                     # build using the Dockerfile in the repo root
          push: true                     # actually push, not just build
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/qr-code-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/qr-code-app:${{ github.sha }}
